name: Bug report
description: Report incorrect behavior, broken docs, schema mismatch, or release-risk issue.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve TasteCraft Decks. Do not include private decks, real customer data, or real logos in public issues.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: The README says X, but the schema requires Y.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - README or docs
        - Schema contract
        - Skill instructions
        - Demo or knowledge examples
        - Governance or release process
        - Packaging or tests
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link paths, snippets, or commands. Keep examples synthetic.
      placeholder: docs/architecture.md says...
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: This issue does not include private customer content, real logos, or personal data.
          required: true

